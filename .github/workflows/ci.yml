name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck
      # Content-addressed variant id invariants (BACKLOG item 02); fast.
      - run: npm run test-cid
      # Endgame test suite (BACKLOG item 01): deterministic policy benchmarks
      # gated against data/endgame-baseline.json — any regression fails.
      - run: npm run endgame-suite
