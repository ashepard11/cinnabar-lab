name: Refresh data
on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run scrape
      - run: npm run build-variants
      - run: npm run build-viz1
      - run: npm run build-viz2
      # evaluator dex depends on the vendored packages + variant roster, both
      # refreshed above; regenerating keeps its validation in the loop.
      - run: npm run build-evaluator-dex
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Refresh data $(date -u +%Y-%m-%d)"
          git push
